<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ZZZ 데이터 대시보드</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
<div id="app">
    <header id="header-section">
        <div class="header-controls">
            <select id="langSelect">
                <option value="ko-kr">한국어</option>
                <option value="en-us">English</option>
                <option value="ja-jp">日本語</option>
                <option value="zh-cn">简体中文</option>
                <option value="zh-tw">繁體中文</option>
                <option value="de-de">Deutsch</option>
                <option value="fr-fr">Français</option>
                <option value="id-id">Indonesia</option>
                <option value="pt-pt">Português</option>
                <option value="es-es">Español</option>
                <option value="ru-ru">Русский</option>
                <option value="th-th">ภาษาไทย</option>
                <option value="vi-vn">Tiếng Việt</option>
                <option value="tr-tr">Türkçe</option>
                <option value="it-it">Italiano</option>
            </select>
            <button id="fetchBtn">ZZZ 계정 정보 가져오기</button>
            <span id="result">대기 중...</span>
        </div>
        <nav id="agent-nav" class="hidden"></nav>
    </header>

    <main id="main-content" class="hidden">
        <aside id="left-panel">
            <div class="section-box portrait-box">
                <div class="portrait-container">
                    <img id="agent-portrait" src="" alt="Agent Portrait">
                    <div class="agent-title">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <img id="agent-rank-icon" src="" style="width: 36px; height: 36px; display: none;">
                            <h1 id="agent-name" style="margin: 0;">-</h1>
                            <img id="agent-element_type" src="" style="width: 36px; height: 36px; display: none;">
                            <img id="agent-profession" src="" style="width: 36px; height: 36px; display: none;">
                        </div>
                        <span id="agent-level">Lv. -</span>
                    </div>
                    <img id="agent-group-icon" class="agent-group-icon" src="">
                </div>
            </div>

            <div class="section-box weapon-box">
                <h3 id="ui-title-weapon">W-엔진 정보</h3>
                <div id="weapon-content"></div>
            </div>

            <div class="section-box skills-box">
                <h3 id="ui-title-skills">스킬 정보</h3>
                <div id="skills-content" class="skills-grid"></div>
            </div>
        </aside>

        <section id="right-panel">
            <div id="stats-summary" class="section-box">
                <h3 id="ui-title-stats">상세 스탯</h3>
                <div id="stats-content" class="stats-grid-container"></div>
            </div>

            <div class="section-box disks-box">
                <h3 id="ui-title-disks">디스크 (장착 정보)</h3>
                <div id="disk-score-container"> <div class="score-info-side">
                    <div class="score-title">디스크에 유효한 서브 스탯 명중 횟수: <span style="color: #fca311;">13회</span></div>
                    <div class="score-target-stat">공격력 백분율</div>
                </div>
                    <div class="score-rank-side">
                        <div class="total-score-text">13</div>
                        <div style="width: 60px; height: 60px; background: #444; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 24px;">S</div>
                    </div>
                </div>
                <div id="disks-container"></div>
            </div>
        </section>
    </main>
</div>
<script src="dashboard.js"></script>
</body>
</html>
