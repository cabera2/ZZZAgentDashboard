<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ZZZ 데이터 대시보드</title>
    <link href="dashboard.css" rel="stylesheet">
</head>
<body>
<script type="module" src="dashboard.js"></script>
<div id="app">
    <header id="header-section">
        <div class="header-controls">
            <select id="langSelect">
                <option value="ko-kr">한국어</option>
                <option value="en-us">English</option>
                <option value="ja-jp">日本語</option>
                <option value="zh-cn">简体中文</option>
                <option value="zh-tw">繁體中文</option>
                <option value="de-de">Deutsch</option>
                <option value="fr-fr">Français</option>
                <option value="id-id">Indonesia</option>
                <option value="pt-pt">Português</option>
                <option value="es-es">Español</option>
                <option value="ru-ru">Русский</option>
                <option value="th-th">ภาษาไทย</option>
                <option value="vi-vn">Tiếng Việt</option>
                <option value="tr-tr">Türkçe</option>
                <option value="it-it">Italiano</option>
            </select>
            <button id="fetchBtn">ZZZ 계정 정보 가져오기</button>
            <span id="result">대기 중...</span>
        </div>
        <nav class="hidden" id="agent-nav"></nav>
    </header>

    <main class="hidden" id="main-content">
        <aside id="left-panel">
            <div class="section-box portrait-box zzz-font-display">
                <div class="portrait-container">
                    <div class="portrait-bg-layer" id="portrait-bg-color"></div>
                    <div class="marquee-container">
                        <span class="marquee-text">NAME1</span>
                        <span class="marquee-text">NAME2</span>
                        <span class="marquee-text">NAME3</span>
                    </div>

                    <img alt="Agent Portrait" id="agent-portrait" src="">
                </div>
                <div class="portrait-frame-overlay" id="portrait-frame"></div>
                <div class="agent-title">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <img id="agent-rank-icon" src="" style="width: 36px; height: 36px; display: none;">
                        <h1 id="agent-name" style="margin: 0;">-</h1>
                        <img id="agent-element-type" src="" style="width: 36px; height: 36px; display: none;">
                        <img id="agent-profession" src="" style="width: 36px; height: 36px; display: none;">
                        <img class="agent-group-icon" id="agent-group-icon" src="">
                    </div>
                    <div id="level-container">
                        <span id="agent-level" style="color: #e8e8e8">Lv. -</span>
                        <img src="https://act.hoyolab.com/app/zzz-game-record/images/icon-deco-level.1e805a4a.png"
                             style="height: 45px">
                        <span class="cinema-indicator" id="cinema1"
                              style="-webkit-mask-image: var(--url-cinema1); 
                         mask-image: var(--url-cinema1);"></span>
                        <span class="cinema-indicator" id="cinema2"
                              style="-webkit-mask-image: var(--url-cinema2); 
                         mask-image: var(--url-cinema2);"></span>
                        <span class="cinema-indicator" id="cinema3"
                              style="-webkit-mask-image: var(--url-cinema3); 
                         mask-image: var(--url-cinema3);"></span>
                        <span class="cinema-indicator" id="cinema4"
                              style="-webkit-mask-image: var(--url-cinema4); 
                         mask-image: var(--url-cinema4);"></span>
                        <span class="cinema-indicator" id="cinema5"
                              style="-webkit-mask-image: var(--url-cinema5); 
                         mask-image: var(--url-cinema5);"></span>
                        <span class="cinema-indicator" id="cinema6"
                              style="-webkit-mask-image: var(--url-cinema6); 
                         mask-image: var(--url-cinema6); "></span>
                        <img class="awaken-ui"
                             id="awaken-slash"
                             src="https://act.hoyolab.com/app/zzz-game-record/images/icon-deco-level.1e805a4a.png" style="height: 45px">
                        <span class="awaken-ui"
                              style="
                              width: 32px;
                              height: 32px;
                              -webkit-mask-image: url('./assets/awakenLabel.svg'); 
                              mask-image: url('./assets/awakenLabel.svg'); 
                              -webkit-mask-size: contain;
                              mask-size: contain;
                              -webkit-mask-repeat: no-repeat;
                              mask-repeat: no-repeat;
                              -webkit-mask-position: center;
                              mask-position: center;
                         background-color: #d9dbdd"></span>
                        <span class="awaken-ui" id="awaken-level" style="color: #aeaeae">0</span>
                        <span class="awaken-ui" style="color: #7f8080">/</span>
                        <span class="awaken-ui" id="awaken-max-level">0</span>
                    </div>

                </div>
            </div>

            <div class="section-box weapon-box">
                <div class="section-box-title">
                    <h3 id="ui-title-weapon">W-엔진 정보</h3>
                    <img class="title-deco" src="">
                    <img class="grid-deco" src="">
                </div>
                <div id="weapon-content">


                    <div class="weapon-container">
                        <img id="weapon-icon">
                        <div id="weapon-detail">
                            <div id="weapon-name-row">
                                <span id="weapon-name">Name</span>
                                <span id = "weapon-level" class="weapon-meta"
                                      style="background-color: #9d9d9d; 
                                      color: #000;
                                      border-radius: 5px;
                                      padding: 5px">Level</span>
                                <img id= "weapon-star" style="height: 25px">
                            </div>
                            <div id="weapon-stats-list">
                                ${mainPropsHtml}
                                ${subPropsHtml}
                            </div>
                        </div>
                    </div>
                    
                    
                </div>
            </div>

            <div class="section-box skills-box">
                <div class="section-box-title">
                    <h3 id="ui-title-skills">스킬 정보</h3>
                    <img class="title-deco" src="">
                    <img class="grid-deco" src="">
                </div>
                <div class="skills-grid" id="skills-content">
                    <div class="skill-icon-wrapper">
                        <img class="skill-icon" src="https://act.hoyoverse.com/gt-ui/assets/icons/1f66bafcc1f069c2.png">
                        <span class="skill-level" id="skillType0">0</span>
                    </div>
                    <div class="skill-icon-wrapper">
                        <img class="skill-icon" src="https://act.hoyoverse.com/gt-ui/assets/icons/b15382e2428392f2.png">
                        <span class="skill-level" id="skillType2">0</span>
                    </div>
                    <div class="skill-icon-wrapper">
                        <img class="skill-icon" src="https://act.hoyoverse.com/gt-ui/assets/icons/38b9cdcdee285da4.png">
                        <span class="skill-level" id="skillType6">0</span>
                    </div>
                    <div class="skill-icon-wrapper">
                        <img class="skill-icon" src="https://act.hoyoverse.com/gt-ui/assets/icons/11ee8bd83f94a1eb.png">
                        <span class="skill-level" id="skillType1">0</span>
                    </div>
                    <div class="skill-icon-wrapper">
                        <img class="skill-icon" src="https://act.hoyoverse.com/gt-ui/assets/icons/25a4b80fcfd80526.png">
                        <span class="skill-level" id="skillType3">0</span>
                    </div>
                    <div class="skill-icon-wrapper">
                        <img class="skill-icon" src="https://act.hoyoverse.com/gt-ui/assets/icons/40791617886f6731.png">
                        <span class="skill-level" id="skillType5">0</span>
                    </div>
                </div>
            </div>
            <div class="section-box test-box" style="padding: 20px;">
                <span style="
                font-size: 30px;
                font-family: 'Impact', sans-serif;">
                    TEST!</span>
            </div>
        </aside>

        <section id="right-panel">
            <div class="section-box" id="stats-summary">
                <div class="section-box-title">
                    <h3 id="ui-title-stats">상세 스탯</h3>
                    <img class="title-deco">
                    <img class="grid-deco" src="">
                </div>
                <div class="stats-grid-container" id="stats-content"></div>
            </div>

            <div class="section-box disks-box">
                <div class="section-box-title">
                    <h3 id="ui-title-disks">디스크</h3>
                    <img class="title-deco" src="">
                    <img class="grid-deco" src="">
                </div>
                <div id="disk-score-container">
                    <img style="object-fit: contain; position: absolute; top: 0; right: 0;"
                         src="https://act.hoyolab.com/app/zzz-game-record/images/deco-bg.7128f6e6.png">
                    <div class="score-info-side">
                        <div id = "score-title" class="zzz-font-display">DISK SCORE</div>
                        <span id="plan-source">PLAN SOURCE</span>
                        <div id="score-target-stats-wrapper"></div>
                    </div>
                    <div id="score-rank-side"></div>
                </div>
                <div id="disks-container"></div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
